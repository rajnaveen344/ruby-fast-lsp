name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            npm-pkg: darwin-arm64
            vsix-platform: darwin-arm64
            bin: ruby-fast-lsp

          - os: macos-latest
            target: x86_64-apple-darwin
            npm-pkg: darwin-x64
            vsix-platform: darwin-x64
            bin: ruby-fast-lsp

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            npm-pkg: linux-x64
            vsix-platform: linux-x64
            bin: ruby-fast-lsp

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            npm-pkg: win32-x64
            vsix-platform: win32-x64
            bin: ruby-fast-lsp.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER: clang
          SDKROOT: /Library/Developer/CommandLineTools/SDKs/MacOSX.sdk

      - name: Copy binary to npm package
        shell: bash
        run: |
          mkdir -p npm/${{ matrix.npm-pkg }}/bin
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} npm/${{ matrix.npm-pkg }}/bin/${{ matrix.bin }}

      - name: Copy binary to VSIX
        shell: bash
        run: |
          mkdir -p vsix/bin/${{ matrix.vsix-platform }}
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} vsix/bin/${{ matrix.vsix-platform }}/${{ matrix.bin }}

      - name: Upload npm artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.npm-pkg }}
          path: npm/${{ matrix.npm-pkg }}

      - name: Upload VSIX binary
        uses: actions/upload-artifact@v4
        with:
          name: vsix-bin-${{ matrix.vsix-platform }}
          path: vsix/bin/${{ matrix.vsix-platform }}

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download all npm artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: artifacts

      - name: Prepare packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

          # Copy built binaries into npm package dirs
          for pkg in darwin-arm64 darwin-x64 linux-x64 win32-x64; do
            cp -r artifacts/npm-${pkg}/* npm/${pkg}/
          done

          # Sync version in all package.json files
          for pkg in ruby-fast-lsp darwin-arm64 darwin-x64 linux-x64 win32-x64; do
            sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" npm/${pkg}/package.json
          done

          # Sync optionalDependencies versions
          for dep in darwin-arm64 darwin-x64 linux-x64 win32-x64; do
            sed -i "s|\"@ruby-fast/lsp-${dep}\": \".*\"|\"@ruby-fast/lsp-${dep}\": \"${VERSION}\"|" npm/ruby-fast-lsp/package.json
          done

      - name: Publish platform packages
        run: |
          for pkg in darwin-arm64 darwin-x64 linux-x64 win32-x64; do
            echo "Publishing @ruby-fast/lsp-${pkg}@${VERSION}..."
            cd npm/${pkg}
            npm publish --access public
            cd ../..
          done

      - name: Publish main CLI package
        run: |
          echo "Publishing @ruby-fast/lsp@${VERSION}..."
          cd npm/ruby-fast-lsp
          npm publish --access public

  publish-vsix:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download all VSIX binaries
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-bin-*
          path: vsix/bin-artifacts

      - name: Prepare VSIX
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

          # Move binaries into place
          for platform in darwin-arm64 darwin-x64 linux-x64 win32-x64; do
            mkdir -p vsix/bin/${platform}
            cp -r vsix/bin-artifacts/vsix-bin-${platform}/* vsix/bin/${platform}/
          done
          rm -rf vsix/bin-artifacts

          # Sync version in VSIX package.json
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" vsix/package.json

          # Pre-zip stubs if script exists
          if [ -f "./scripts/zip_stubs.sh" ]; then
            ./scripts/zip_stubs.sh
          fi

      - name: Install VSIX dependencies
        run: |
          cd vsix
          npm install

      - name: Package VSIX
        run: |
          cd vsix
          npx @vscode/vsce package

      - name: Publish to VS Code Marketplace
        run: |
          cd vsix
          npx @vscode/vsce publish -p ${{ secrets.VSCE_TOKEN }}

      - name: Publish to Open VSX
        run: |
          cd vsix
          npx ovsx publish *.vsix -p ${{ secrets.OVSX_TOKEN }}

  create-release:
    needs: [publish-npm, publish-vsix]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
